<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07C160" />
    <meta name="description" content="郝煜伽给爸爸妈妈整理的生活指南。" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>给爸爸妈妈的生活指南</title>
    <style>
      :root {
        --bg: #f7f8fa;
        --green: #07c160;
        --green-dark: #069a4c;
        --green-soft: #e8f5e9;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --line: #e5e7eb;
        --warm: #fff7e8;
        --warn: #f59e0b;
        --red-soft: #fff1f2;
        --shadow: 0 8px 24px rgba(31, 41, 55, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
        font-size: 19px;
        line-height: 1.75;
        -webkit-font-smoothing: antialiased;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      a {
        color: var(--green-dark);
        text-decoration: none;
      }

      .app {
        min-height: 100vh;
        padding-bottom: 98px;
      }

      .page {
        width: min(920px, 100%);
        margin: 0 auto;
        padding: 18px 16px 34px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(247, 248, 250, 0.96);
        border-bottom: 1px solid rgba(229, 231, 235, 0.9);
        backdrop-filter: blur(12px);
      }

      .topbar-inner {
        width: min(920px, 100%);
        min-height: 64px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 88px 1fr 88px;
        align-items: center;
        padding: 8px 16px;
      }

      .back-btn {
        min-height: 46px;
        border-radius: 999px;
        background: #ffffff;
        color: var(--text);
        border: 1px solid var(--line);
      }

      .top-title {
        margin: 0;
        text-align: center;
        font-size: 28px;
        line-height: 1.25;
        font-weight: 800;
        letter-spacing: 0;
      }

      .hero {
        background: linear-gradient(180deg, #ffffff 0%, #f1fff6 100%);
        border-radius: 18px;
        padding: 28px 22px;
        box-shadow: var(--shadow);
        border: 1px solid rgba(7, 193, 96, 0.12);
      }

      .hero h1 {
        margin: 0;
        text-align: center;
        font-size: 32px;
        line-height: 1.35;
      }

      .hero p {
        margin: 18px 0 0;
        color: #374151;
        font-size: 20px;
        text-align: center;
      }

      .section-title {
        margin: 28px 2px 14px;
        font-size: 24px;
        line-height: 1.35;
        font-weight: 800;
      }

      .grid {
        display: grid;
        gap: 14px;
      }

      .grid.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 20px;
        box-shadow: 0 5px 18px rgba(31, 41, 55, 0.05);
      }

      .card.warm {
        background: var(--warm);
        border-color: #fde7bd;
      }

      .card.green {
        background: var(--green-soft);
        border-color: #cdebd2;
      }

      .card.red-soft {
        background: var(--red-soft);
        border-color: #fecdd3;
      }

      .card h2,
      .card h3 {
        margin: 0 0 12px;
        font-size: 22px;
        line-height: 1.4;
      }

      .card p {
        margin: 8px 0;
      }

      .muted {
        color: var(--muted);
      }

      .small {
        font-size: 15px;
        line-height: 1.65;
      }

      .action-card {
        min-height: 136px;
        width: 100%;
        padding: 20px;
        border-radius: 20px;
        background: #ffffff;
        color: var(--text);
        border: 1px solid var(--line);
        box-shadow: 0 6px 18px rgba(31, 41, 55, 0.06);
        text-align: left;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 12px;
      }

      .action-card:active,
      .primary-btn:active,
      .toggle-btn:active,
      .nav-btn:active {
        transform: scale(0.985);
      }

      .action-icon {
        width: 54px;
        height: 54px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: #effdf4;
        font-size: 30px;
      }

      .action-title {
        display: block;
        font-size: 22px;
        font-weight: 800;
        line-height: 1.35;
      }

      .action-desc {
        display: block;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.55;
      }

      .page-band {
        margin: 12px 0 18px;
        padding: 22px;
        border-radius: 20px;
        background: #ffffff;
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
      }

      .page-band h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.35;
      }

      .page-band p {
        margin: 12px 0 0;
        font-size: 20px;
        color: #374151;
      }

      .tip-list,
      .number-list {
        display: grid;
        gap: 10px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .tip-list li,
      .number-list li {
        background: #f9fafb;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px 14px;
      }

      .number-list {
        counter-reset: item;
      }

      .number-list li {
        display: grid;
        grid-template-columns: 34px 1fr;
        align-items: start;
        gap: 8px;
      }

      .number-list li::before {
        counter-increment: item;
        content: counter(item);
        width: 30px;
        height: 30px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: var(--green);
        color: white;
        font-size: 17px;
        font-weight: 800;
        line-height: 1;
      }

      .columns {
        display: grid;
        gap: 14px;
      }

      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
      }

      .pill {
        padding: 8px 12px;
        border-radius: 999px;
        background: #f3f4f6;
        border: 1px solid var(--line);
        font-size: 17px;
      }

      .primary-btn {
        width: 100%;
        min-height: 60px;
        border-radius: 16px;
        background: var(--green);
        color: white;
        font-size: 21px;
        font-weight: 800;
      }

      .soft-btn {
        background: #ffffff;
        color: var(--text);
        border: 1px solid var(--line);
      }

      .check-grid {
        display: grid;
        gap: 12px;
      }

      .toggle-btn {
        width: 100%;
        min-height: 62px;
        border-radius: 16px;
        padding: 12px 14px;
        text-align: left;
        background: #ffffff;
        border: 1px solid var(--line);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .toggle-btn.done {
        background: var(--green-soft);
        border-color: #bfe7c7;
      }

      .toggle-main {
        font-size: 20px;
        font-weight: 700;
        line-height: 1.35;
      }

      .toggle-mark {
        flex: 0 0 auto;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: #f3f4f6;
        color: var(--muted);
        font-weight: 900;
      }

      .toggle-btn.done .toggle-mark {
        background: var(--green);
        color: #ffffff;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      .field label {
        font-weight: 800;
        font-size: 20px;
      }

      .field select {
        min-height: 58px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: #ffffff;
        color: var(--text);
        padding: 0 14px;
      }

      .plate {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .plate .veg {
        grid-row: span 2;
        background: #e8f5e9;
      }

      .plate div {
        min-height: 112px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 12px;
        font-size: 20px;
        font-weight: 800;
        border: 1px solid var(--line);
      }

      .table {
        display: grid;
        gap: 10px;
      }

      .table-row {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 10px;
        padding: 12px;
        background: #f9fafb;
        border: 1px solid var(--line);
        border-radius: 14px;
      }

      .bottom-nav {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 20;
        background: #ffffff;
        border-top: 1px solid var(--line);
        box-shadow: 0 -8px 24px rgba(31, 41, 55, 0.08);
      }

      .bottom-inner {
        width: min(920px, 100%);
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 4px;
        padding: 8px 8px 10px;
      }

      .nav-btn {
        min-height: 64px;
        border-radius: 14px;
        background: transparent;
        color: var(--muted);
        display: grid;
        place-items: center;
        gap: 2px;
        font-size: 15px;
      }

      .nav-btn strong {
        font-size: 24px;
        line-height: 1;
      }

      .nav-btn.active {
        color: var(--green-dark);
        background: #effdf4;
        font-weight: 800;
      }

      @media (min-width: 720px) {
        .page {
          padding: 28px 24px 48px;
        }

        .grid.two,
        .columns {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .check-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .hero {
          padding: 34px 32px;
        }
      }

      @media (max-width: 430px) {
        body {
          font-size: 18px;
        }

        .grid.two {
          grid-template-columns: 1fr;
        }

        .topbar-inner {
          grid-template-columns: 76px 1fr 76px;
          padding: 8px 12px;
        }

        .top-title {
          font-size: 25px;
        }

        .hero h1 {
          font-size: 30px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app" class="app"></div>
    <script>
      const $ = (selector) => document.querySelector(selector);
      const h = (value) =>
        String(value).replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        }[char]));

      const todayKey = new Date().toISOString().slice(0, 10);
      const dadKey = "parents-helper-dad";
      const momKey = "parents-helper-mom";

      const defaults = {
        dad: { day: todayKey, wokeEarly: false, exercised: false, sleptEarly: false, lessAlcohol: false, goodMood: false },
        mom: { day: todayKey, walked: false, protein: false, goodMood: false, appetite: "还可以" },
      };

      function loadState(key, fallback) {
        try {
          const saved = JSON.parse(localStorage.getItem(key) || "{}");
          return saved.day === todayKey ? { ...fallback, ...saved } : { ...fallback };
        } catch {
          return { ...fallback };
        }
      }

      let page = "home";
      let applianceId = "air";
      let dadState = loadState(dadKey, defaults.dad);
      let momState = loadState(momKey, defaults.mom);

      const homeActions = [
        { title: "爸爸健康提醒", desc: "早起、少喝酒、早点睡、身体舒服最重要。", icon: "👨", page: "dad" },
        { title: "妈妈健康提醒", desc: "吃点蛋白质，出门走走，心情也要轻松一点。", icon: "👩", page: "mom" },
      ];

      const guideActions = [
        { title: "家电安心指南", desc: "空调、空气质量、微波炉、冰箱、燃气都能慢慢查。", icon: "🏠", page: "appliances" },
        { title: "肉蛋奶水果蔬菜百科", desc: "像小百科一样，查每天吃什么、有什么用、吃多少。", icon: "🥗", page: "foodGuide" },
      ];

      const applianceGuides = [
        {
          id: "air",
          icon: "❄️",
          title: "空调与空气质量",
          summary: "主要看手机天气 APP 里的空气质量指数，以及空调面板上常见数字。",
          sections: [
            {
              title: "手机上天气 APP 中空气质量指数怎么看",
              type: "number",
              items: [
                "0-50：空气质量优，正常开窗通风一般没问题。",
                "51-100：空气质量良，大多数时候可以正常活动。",
                "101-150：轻度污染，老人和身体不舒服时少开窗太久。",
                "151-200：中度污染，尽量减少长时间开窗和户外活动。",
                "201 以上：污染较重，优先关窗，必要时开空气净化器。",
              ],
            },
            {
              title: "空调控制面板上显示常见数字",
              type: "number",
              items: [
                "温度：一般显示 16-30℃，数字越低越凉，数字越高越暖。",
                "湿度：一般 40%-60% 比较舒服，太低容易干，太高容易闷。",
                "PM2.5：数值越低越好，超过 75 时建议减少开窗。",
                "CO2：800ppm 以下通常比较舒服，超过 1000ppm 说明屋里可能有点闷。",
                "甲醛：如果长期显示偏高，要多通风、减少刺激性气味来源，必要时找专业检测。",
              ],
            },
            {
              title: "小提醒",
              type: "number",
              items: [
                "去甲醛最实用的方法是长期通风，白天条件合适时开窗 20-30 分钟。",
                "新家具、新窗帘、新柜子味道重时，先多开柜门通风，不要急着把房间关得很严。",
                "活性炭可以辅助吸附异味，但要定期更换，放很久不换效果会变差。",
                "提高空气质量可以先做三件事：开窗通风、清理灰尘、保持空调滤网干净。",
                "室内空气不好常见原因有：长时间不开窗、做饭油烟、吸烟、潮湿发霉、新家具味道、灰尘堆积。",
              ],
            },
          ],
          refs: [
            ["生态环境部《环境空气质量指数 AQI 技术规定（试行）》", "https://www.mee.gov.cn/ywgz/fgbz/bz/bzwb/jcffbz/201203/t20120302_224166.shtml"],
            ["中国疾病预防控制中心：室内空气与健康相关科普", "https://www.chinacdc.cn/"],
          ],
        },
        {
          id: "microwave",
          icon: "🔥",
          title: "微波炉材质",
          summary: "先看容器材质，能不能加热比加热多久更重要。",
          sections: [
            {
              title: "可以放进微波炉",
              type: "number",
              items: [
                "标有“微波炉适用”的玻璃碗、玻璃杯。",
                "标有“微波炉适用”的陶瓷碗。",
                "标有“5 PP”或“微波炉适用”的塑料盒。",
                "微波炉专用保鲜膜，但不要让保鲜膜直接贴住食物。",
              ],
            },
            {
              title: "不要放进微波炉",
              type: "number",
              items: [
                "金属碗、铁盘、不锈钢杯、带金边银边的碗。",
                "普通一次性塑料盒、外卖盒、酸奶盒。",
                "纸袋、报纸、普通塑料袋。",
                "完整带壳鸡蛋、密封罐、密封瓶，容易受热膨胀。",
              ],
            },
            {
              title: "加热小提醒",
              type: "number",
              items: [
                "汤和粥加热后先放一小会儿，再慢慢搅一搅。",
                "盒饭加热时，把盖子留一点缝，不要完全密封。",
                "油多、糖多的食物不要一次加热太久。",
              ],
            },
          ],
          refs: [
            ["国家市场监督管理总局：食品接触用塑料材料及制品相关标准", "https://www.samr.gov.cn/"],
            ["中国食品科学技术学会食品安全科普", "https://www.cifst.org.cn/"],
          ],
        },
        {
          id: "fridge",
          icon: "🧊",
          title: "冰箱保存时间",
          summary: "冷藏和冷冻分开看，生熟分开，闻着不对就不要吃。",
          sections: [
            {
              title: "冷藏室大概能放多久",
              type: "number",
              items: [
                "熟米饭、熟面条：1-2 天，吃前要彻底加热。",
                "熟肉、熟菜：1-2 天，最好当天或第二天吃完。",
                "生猪肉、生牛肉、生羊肉：1-2 天。",
                "生鸡肉、鸭肉：1-2 天。",
                "鱼虾：当天或 1 天内更稳妥。",
                "鸡蛋：一般 3-5 周，放冰箱时不要反复清洗。",
                "绿叶菜：2-3 天，越新鲜越好。",
                "苹果、橙子：1-3 周，坏了一处要及时挑出来。",
              ],
            },
            {
              title: "冷冻室大概能放多久",
              type: "number",
              items: [
                "猪肉、牛肉、羊肉：一般 3-6 个月内吃完更好。",
                "鸡肉、鸭肉：一般 3-6 个月内吃完更好。",
                "鱼虾：一般 1-3 个月内吃完更好，放久了口感会变差。",
                "饺子、馄饨：一般 1-2 个月内吃完更好。",
                "馒头、包子：一般 1 个月内吃完更好。",
                "冷冻蔬菜：一般 1-3 个月内吃完更好。",
              ],
            },
            {
              title: "最重要的三件事",
              type: "number",
              items: [
                "生肉要单独包好，别碰到熟菜和水果。",
                "剩饭剩菜放凉后尽快进冰箱，不要在桌上放一整晚。",
                "拿出来解冻过的肉，尽量不要反复冻回去。",
              ],
            },
          ],
          refs: [
            ["中国营养学会《中国居民膳食指南（2022）》", "https://dg.cnsoc.org/"],
            ["国家食品安全风险评估中心食品安全科普", "https://www.cfsa.net.cn/"],
          ],
        },
        {
          id: "gas",
          icon: "🍳",
          title: "燃气安全",
          summary: "做饭前后多看一眼，闻到味道先通风。",
          sections: [
            {
              title: "每天做饭前",
              type: "number",
              items: [
                "看灶台周围有没有纸巾、塑料袋、油布等容易着火的东西。",
                "先开油烟机或窗户，让厨房空气流通。",
                "点火后看火苗，正常多为蓝色，明显发黄要留意。",
              ],
            },
            {
              title: "做完饭后",
              type: "number",
              items: [
                "先关灶具开关，再确认燃气阀门关好。",
                "锅别空烧，离开厨房前看一眼火有没有完全灭。",
                "油锅起火不要倒水，先关火，用锅盖盖住。",
              ],
            },
            {
              title: "闻到燃气味",
              type: "number",
              items: [
                "不要开灯，不要打火，不要插拔电器。",
                "先关阀门，打开门窗通风。",
                "到室外安全地方再联系燃气公司或孩子。",
              ],
            },
          ],
          refs: [
            ["住房和城乡建设部燃气安全相关公开资料", "https://www.mohurd.gov.cn/"],
            ["中国城市燃气协会安全用气提示", "https://www.chinagas.org.cn/"],
          ],
        },
        {
          id: "heater",
          icon: "♨️",
          title: "热水器与洗澡安全",
          summary: "洗澡舒服最重要，也要注意通风和防滑。",
          sections: [
            {
              title: "洗澡前",
              type: "number",

                "牛奶和酸奶能补钙、补蛋白，对骨骼和肌肉有帮助。",
                "豆腐、豆浆是植物蛋白，口感软，胃口不好时也比较容易吃。",
                "如果喝牛奶肚子不舒服，可以试试酸奶、温牛奶，或者少量多次。",
              ], true)}
            `, "green")}

            ${card("温馨提醒", `
              <p>妈妈胃口不好时，也记得多少吃一点鸡蛋、豆腐或者牛奶。</p>
              <p>慢慢吃、规律吃，比一顿吃很多更重要。</p>
            `, "warm")}
            ${healthFooter()}
          </main>
          ${bottomNav()}
        `;
      }

      function renderMomExercise() {
        return `
          ${header("妈妈运动建议")}
          <main class="page">
            ${pageBand("妈妈每天活动一点点就很好", "运动不是很累的事情，慢慢来就很好。")}

            ${card("饭后散步", list([
              "饭后慢慢走 10-20 分钟。",
              "有助于消化。",
              "有助于睡眠。",
              "对血糖也有帮助。",
              "走路不用很快，慢慢走也很好。",
            ], true), "green")}

            ${card("每天活动建议", list([
              "每天累计活动 30 分钟左右即可。",
              "可以分成早上 10 分钟、下午 10 分钟、晚上 10 分钟。",
              "累的时候就少走一点，舒服最重要。",
            ], true))}

            ${card("久坐提醒", `
              <p>看电视或坐太久时，每 1 小时起来活动 3-5 分钟。</p>
            `, "warm")}

            ${card("简单拉伸", list([
              "活动肩膀。",
              "伸伸腿。",
              "转转腰。",
              "帮助缓解腰背不舒服。",
            ], true))}

            ${card("热量消耗（简单版）", `
              <div class="table">
                <div class="table-row"><strong>慢走 30 分钟</strong><span>约 80-120 卡路里</span></div>
                <div class="table-row"><strong>拖地 30 分钟</strong><span>约 100 卡路里</span></div>
                <div class="table-row"><strong>买菜走路 30 分钟</strong><span>约 100 卡路里</span></div>
              </div>
              <p class="muted">不需要特别精准，知道“动一动有帮助”就可以。</p>
            `)}

            ${card("温柔提醒", `
              <p>妈妈不用一下子运动很多，慢慢坚持更重要。</p>
              <p>每天活动一点点，也比一直坐着好很多。</p>
            `, "warm")}
            ${healthFooter()}
          </main>
          ${bottomNav()}
        `;
      }

      function renderFoodGuide() {
        return `
          ${header("食物小百科")}
          <main class="page">
            ${pageBand("每天吃一点，身体更舒服")}
            <div class="grid">
              ${foodItems.map(([name, effect, advice]) => card(name, `
                <p><strong>作用：</strong>${h(effect)}</p>
                <p><strong>建议：</strong>${h(advice)}</p>
              `)).join("")}
            </div>
            ${healthFooter()}
          </main>
          ${bottomNav()}
        `;
      }

      function render() {
        const routes = {
          home: renderHome,
          knowledge: renderKnowledge,
          appliances: renderAppliances,
          applianceDetail: renderApplianceDetail,
          dad: renderDad,
          mom: renderMom,
          momDiet: renderMomDiet,
          momExercise: renderMomExercise,
          foodGuide: renderFoodGuide,
        };
        $("#app").innerHTML = (routes[page] || renderHome)();
      }

      document.addEventListener("click", (event) => {
        const pageButton = event.target.closest("[data-page]");
        if (pageButton) {
          page = pageButton.dataset.page;
          window.scrollTo({ top: 0, behavior: "instant" });
          render();
          return;
        }

        const applianceButton = event.target.closest("[data-appliance]");
        if (applianceButton) {
          applianceId = applianceButton.dataset.appliance;
          page = "applianceDetail";
          window.scrollTo({ top: 0, behavior: "instant" });
          render();
          return;
        }

        if (event.target.closest("[data-back]")) {
          if (page === "applianceDetail") page = "appliances";
          else page = "home";
          window.scrollTo({ top: 0, behavior: "instant" });
          render();
          return;
        }

        const toggle = event.target.closest("[data-toggle-scope]");
        if (toggle) {
          const scope = toggle.dataset.toggleScope;
          const key = toggle.dataset.toggleKey;
          if (scope === "dad") {
            dadState[key] = !dadState[key];
            save("dad");
          }
          if (scope === "mom") {
            momState[key] = !momState[key];
            save("mom");
          }
          render();
        }
      });

      document.addEventListener("change", (event) => {
        if (event.target.matches("[data-mom-appetite]")) {
          momState.appetite = event.target.value;
          save("mom");
        }
      });

      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./service-worker.js").catch(() => {});
        });
      }

      render();
    </script>
  </body>
</html>
